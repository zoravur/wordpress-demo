services:

  wordpress:
    image: wordpress:6.9-php8.3-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_demo_pass_2026
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 120);
    volumes:
      - wordpress_data:/var/www/html
      # Uncomment to mount a custom theme or plugin for development:
      # - ./my-theme:/var/www/html/wp-content/themes/my-theme
      # - ./my-plugin:/var/www/html/wp-content/plugins/my-plugin
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_demo_pass_2026
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: phpMyAdmin for quick DB browsing
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: wp_user
      PMA_PASSWORD: wp_demo_pass_2026
    depends_on:
      db:
        condition: service_healthy

volumes:
  wordpress_data:
  db_data: